/* APP */
function App() {
  const [active, setActive] = useState('hero');
  const [scrolled, setScrolled] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {if (e.isIntersecting) setActive(e.target.id);});
    }, { threshold: 0.3 });
    document.querySelectorAll('section[id]').forEach((s) => obs.observe(s));
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => {obs.disconnect();window.removeEventListener('scroll', onScroll);};
  }, []);

  useEffect(() => {
    const root = document.documentElement;
    const t = THEMES[tweaks.theme] || THEMES.cognac;
    root.style.setProperty('--accent', t.accent);
    root.style.setProperty('--accent-dim', t.accentDim);
    if (tweaks.bg === 'dark') {
      root.style.setProperty('--bg', '#0c0b09');
      document.documentElement.style.backgroundColor = '#0c0b09';
      root.style.setProperty('--surface', '#141210');
      root.style.setProperty('--surface-2', '#1c1a16');root.style.setProperty('--surface-3', '#242119');
      root.style.setProperty('--text', '#f0ede6');root.style.setProperty('--text-dim', '#b8b4ac');
      root.style.setProperty('--text-muted', '#6e6b64');
      root.style.setProperty('--border', 'rgba(255,255,255,0.07)');root.style.setProperty('--border-2', 'rgba(255,255,255,0.12)');
    } else {
      root.style.setProperty('--bg', '#efeae0');
      document.documentElement.style.backgroundColor = '#efeae0';
      root.style.setProperty('--surface', '#faf6ee');
      root.style.setProperty('--surface-2', '#f3ede2');root.style.setProperty('--surface-3', '#ebe4d6');
      root.style.setProperty('--text', '#2a2520');root.style.setProperty('--text-dim', '#4a4540');
      root.style.setProperty('--text-muted', '#8a8278');
      root.style.setProperty('--border', 'rgba(155,135,105,0.18)');root.style.setProperty('--border-2', 'rgba(155,135,105,0.32)');
    }
  }, [tweaks]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');else
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    const thEl = document.getElementById('tw-theme');
    const bgEl = document.getElementById('tw-bg');
    const cpEl = document.getElementById('tw-compact');
    if (!thEl) return;
    const apply = () => {
      const next = { theme: thEl.value, bg: bgEl.value, compact: cpEl.checked };
      setTweaks(next);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
    };
    thEl.value = tweaks.theme;bgEl.value = tweaks.bg;cpEl.checked = tweaks.compact;
    [thEl, bgEl, cpEl].forEach((el) => el.addEventListener('change', apply));
    return () => [thEl, bgEl, cpEl].forEach((el) => el.removeEventListener('change', apply));
  }, [tweaks]);

  return (
    <>
      <Nav active={active} scrolled={scrolled} />
      <Hero />
      <Projects />
      <About />
      <Skills />
      <Timeline />
      <Contact />
      <Footer />
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

<script>
(function() {
  // Only on pointer:fine (non-touch) devices
  if (!window.matchMedia('(pointer: fine)').matches) return;
  var html = document.documentElement;
  var ticking = false;
  var lastY = 0;
  function update() {
    // Parallax: grid moves at 40% scroll speed via background-position
    html.style.backgroundPositionY = (lastY * 0.4) + 'px';
    ticking = false;
  }
  window.addEventListener('scroll', function() {
    lastY = window.scrollY;
    if (!ticking) {
      requestAnimationFrame(update);
      ticking = true;
    }
  }, { passive: true });
})();
</script>
